name: kora-labs-common
on:
  push:
    branches:
      - master
  workflow_dispatch:
permissions:
  id-token: write  # Required for OIDC
  contents: read
  packages: write  # Required for GitHub Packages publish
jobs:
  deploy:
    name: Deploying from ${{ github.ref_name }}
    environment: mainnet
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org

    - name: Install
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Test
      run: npm run test

    - name: Build
      run: npm run build && cp package.json ./lib/package.json

    - name: Publish to GitHub Packages
      run: |
        npm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}
        publish_log=$(mktemp)
        set +e
        (cd ./lib && npm publish --@koralabs:registry='https://npm.pkg.github.com') >"${publish_log}" 2>&1
        status=$?
        set -e
        cat "${publish_log}"
        if [[ $status -ne 0 ]]; then
          if grep -q "Cannot publish over existing version" "${publish_log}"; then
            echo "GitHub Packages version already exists, continuing"
          else
            rm -f "${publish_log}"
            exit $status
          fi
        fi
        rm -f "${publish_log}"

    - name: Publish to npmjs
      run: |
        publish_log=$(mktemp)
        set +e
        (cd ./lib && npm publish --provenance --access public) >"${publish_log}" 2>&1
        status=$?
        set -e
        cat "${publish_log}"
        if [[ $status -ne 0 ]]; then
          if grep -q "You cannot publish over the previously published versions" "${publish_log}"; then
            echo "npmjs version already exists, continuing"
          else
            rm -f "${publish_log}"
            exit $status
          fi
        fi
        rm -f "${publish_log}"
